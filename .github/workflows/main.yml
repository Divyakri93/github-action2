name: CI Pipeline (separate jobs)

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: echo "Testing Successfully"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task2actions:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task2actions:latest

  push:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - run: echo "Image pushed successfully ✅"

  deploy:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}